replicaCount: 1

image:
  repository: ghcr.io/undy-io/smtp-cloud-relay
  tag: "" # defaults to the published chart appVersion when unset
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

deliveryMode: acs

delivery:
  retryAttempts: 3
  retryBaseDelayMS: 1000
  httpTimeoutMS: 30000
  httpMaxIdleConns: 200
  httpMaxIdleConnsPerHost: 50
  httpIdleConnTimeoutMS: 90000

spool:
  dir: /var/lib/smtp-cloud-relay/spool
  pollIntervalMS: 1000
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
    existingClaim: ""

proxy:
  httpProxy: ""
  httpsProxy: ""
  noProxy: ""

smtp:
  listenHost: 0.0.0.0
  port: 2525
  allowedCIDRs:
    - 10.0.0.0/8
  requireAuth: true
  authProvider: static
  starttlsEnabled: true
  requireTLS: false
  maxInflightSends: 200
  smtps:
    enabled: true
    listenHost: 0.0.0.0
    port: 2465

senderPolicy:
  mode: rewrite
  allowedDomains: [] # bare exact domains, glob:*.example.com, or re:(?:.+\\.)?example\\.com

http:
  listenHost: 0.0.0.0
  port: 8080

acs:
  endpoint: ""
  tlsCAFile: "" # deprecated alias for outboundTLS.caFile

outboundTLS:
  caFile: ""

ses:
  region: ""
  sender: ""
  endpoint: ""
  configurationSet: ""

secrets:
  create: true
  existingSecret: ""
  acsConnectionString: "endpoint=https://example.communication.azure.us;accesskey=REPLACE_ME" # bootstrap placeholder; override for real ACS delivery
  acsSender: "no-reply@example.com" # bootstrap placeholder; override for real ACS delivery
  sesAccessKeyID: ""
  sesSecretAccessKey: ""
  sesSessionToken: ""
  smtpAuthUsername: "relay" # bootstrap placeholder; override for real deployments
  smtpAuthPassword: "change-me" # bootstrap placeholder; override for real deployments
  outboundTLSCAPEM: ""
  acsTLSCAPEM: "" # deprecated alias for outboundTLSCAPEM
  keys:
    acsConnectionString: ACS_CONNECTION_STRING
    acsSender: ACS_SENDER
    sesAccessKeyID: SES_ACCESS_KEY_ID
    sesSecretAccessKey: SES_SECRET_ACCESS_KEY
    sesSessionToken: SES_SESSION_TOKEN
    smtpAuthUsername: SMTP_AUTH_USERNAME
    smtpAuthPassword: SMTP_AUTH_PASSWORD
    outboundTLSCAPEM: OUTBOUND_TLS_CA_PEM
    acsTLSCAPEM: ACS_TLS_CA_PEM # deprecated alias for outboundTLSCAPEM

tls:
  mode: certManager # certManager, existingSecret, or disabled
  certFile: /etc/smtp-tls/tls.crt
  keyFile: /etc/smtp-tls/tls.key
  existingSecretName: "" # required when tls.mode=existingSecret

certManager:
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: cluster-issuer
  commonName: ""
  dnsNames:
    - smtp-cloud-relay.default.svc
  altNames: []
  subject: {}
  duration: 2160h
  renewBefore: 360h

extraTrustedCA:
  enabled: false
  mountPath: /etc/acs-ca
  existingSecret: ""
  key: ca.pem

probes:
  liveness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

networkPolicy:
  enabled: true
  allowDNS: true
  ingressCIDRs:
    - 10.0.0.0/8
  egressCIDRs:
    - 0.0.0.0/0
  egressTCPPorts:
    - 80
    - 443

pdb:
  enabled: false
  minAvailable: 1
