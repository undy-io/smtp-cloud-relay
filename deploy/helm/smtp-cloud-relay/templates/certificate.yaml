{{- $starttlsEnabled := true -}}
{{- if hasKey .Values.smtp "starttlsEnabled" -}}
{{- $starttlsEnabled = .Values.smtp.starttlsEnabled -}}
{{- end -}}
{{- $smtpsEnabled := false -}}
{{- if and (hasKey .Values.smtp "smtps") (hasKey .Values.smtp.smtps "enabled") -}}
{{- $smtpsEnabled = .Values.smtp.smtps.enabled -}}
{{- end -}}
{{- $tlsRequested := or $starttlsEnabled $smtpsEnabled .Values.smtp.requireTLS -}}
{{- if and (eq (lower (default "certManager" .Values.tls.mode)) "certmanager") $tlsRequested }}
{{- $cn := .Values.certManager.commonName -}}
{{- $san := list -}}
{{- range .Values.certManager.dnsNames }}
{{- $san = append $san . -}}
{{- end }}
{{- range .Values.certManager.altNames }}
{{- $san = append $san . -}}
{{- end }}
{{- if and $cn (not (has $cn $san)) }}
{{- $san = append $san $cn -}}
{{- end }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "smtp-cloud-relay.fullname" . }}
  labels:
    {{- include "smtp-cloud-relay.labels" . | nindent 4 }}
spec:
  secretName: {{ include "smtp-cloud-relay.tlsSecretName" . }}
  duration: {{ .Values.certManager.duration }}
  renewBefore: {{ .Values.certManager.renewBefore }}
  issuerRef:
    {{- if .Values.certManager.issuerRef.group }}
    group: {{ .Values.certManager.issuerRef.group }}
    {{- end }}
    kind: {{ .Values.certManager.issuerRef.kind }}
    name: {{ .Values.certManager.issuerRef.name }}
  {{- if $cn }}
  commonName: {{ $cn | quote }}
  {{- end }}
  {{- if gt (len $san) 0 }}
  dnsNames:
    {{- range $san }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  {{- with .Values.certManager.subject }}
  subject:
    {{- if .organizations }}
    organizations:
      {{- toYaml .organizations | nindent 6 }}
    {{- end }}
    {{- if .organizationalUnits }}
    organizationalUnits:
      {{- toYaml .organizationalUnits | nindent 6 }}
    {{- end }}
    {{- if .countries }}
    countries:
      {{- toYaml .countries | nindent 6 }}
    {{- end }}
    {{- if .localities }}
    localities:
      {{- toYaml .localities | nindent 6 }}
    {{- end }}
    {{- if .provinces }}
    provinces:
      {{- toYaml .provinces | nindent 6 }}
    {{- end }}
  {{- end }}
{{- end }}
