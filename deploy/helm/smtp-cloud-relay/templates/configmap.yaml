{{- $outboundTLSCAFile := default .Values.acs.tlsCAFile .Values.outboundTLS.caFile -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "smtp-cloud-relay.fullname" . }}-config
  labels:
    {{- include "smtp-cloud-relay.labels" . | nindent 4 }}
data:
  DELIVERY_MODE: {{ .Values.deliveryMode | quote }}

  SMTP_LISTEN_ADDR: {{ include "smtp-cloud-relay.smtpListenAddr" . | quote }}
  SMTPS_LISTEN_ADDR: {{ include "smtp-cloud-relay.smtpsListenAddr" . | quote }}
  SMTP_ALLOWED_CIDRS: {{ join "," .Values.smtp.allowedCIDRs | quote }}
  SMTP_REQUIRE_AUTH: {{ .Values.smtp.requireAuth | quote }}
  SMTP_AUTH_PROVIDER: {{ .Values.smtp.authProvider | quote }}
  SMTP_STARTTLS_ENABLED: {{ .Values.smtp.starttlsEnabled | quote }}
  SMTP_REQUIRE_TLS: {{ .Values.smtp.requireTLS | quote }}
  SMTP_TLS_CERT_FILE: {{ .Values.tls.certFile | quote }}
  SMTP_TLS_KEY_FILE: {{ .Values.tls.keyFile | quote }}
  SMTP_MAX_INFLIGHT_SENDS: {{ .Values.smtp.maxInflightSends | quote }}
  SENDER_POLICY_MODE: {{ .Values.senderPolicy.mode | quote }}
  SENDER_ALLOWED_DOMAINS: {{ join "," .Values.senderPolicy.allowedDomains | quote }}

  HTTP_LISTEN_ADDR: {{ include "smtp-cloud-relay.httpListenAddr" . | quote }}

  DELIVERY_RETRY_ATTEMPTS: {{ .Values.delivery.retryAttempts | quote }}
  DELIVERY_RETRY_BASE_DELAY_MS: {{ .Values.delivery.retryBaseDelayMS | quote }}
  DELIVERY_HTTP_TIMEOUT_MS: {{ .Values.delivery.httpTimeoutMS | quote }}
  DELIVERY_HTTP_MAX_IDLE_CONNS: {{ .Values.delivery.httpMaxIdleConns | quote }}
  DELIVERY_HTTP_MAX_IDLE_CONNS_PER_HOST: {{ .Values.delivery.httpMaxIdleConnsPerHost | quote }}
  DELIVERY_HTTP_IDLE_CONN_TIMEOUT_MS: {{ .Values.delivery.httpIdleConnTimeoutMS | quote }}
  SPOOL_DIR: {{ .Values.spool.dir | quote }}
  SPOOL_POLL_INTERVAL_MS: {{ .Values.spool.pollIntervalMS | quote }}

  ACS_ENDPOINT: {{ .Values.acs.endpoint | quote }}
  SES_REGION: {{ .Values.ses.region | quote }}
  SES_SENDER: {{ .Values.ses.sender | quote }}
  SES_ENDPOINT: {{ .Values.ses.endpoint | quote }}
  SES_CONFIGURATION_SET: {{ .Values.ses.configurationSet | quote }}
  {{- if $outboundTLSCAFile }}
  OUTBOUND_TLS_CA_FILE: {{ $outboundTLSCAFile | quote }}
  {{- else if .Values.extraTrustedCA.enabled }}
  OUTBOUND_TLS_CA_FILE: {{ printf "%s/%s" .Values.extraTrustedCA.mountPath .Values.extraTrustedCA.key | quote }}
  {{- end }}
