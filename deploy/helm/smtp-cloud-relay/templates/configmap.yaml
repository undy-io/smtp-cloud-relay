apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "smtp-cloud-relay.fullname" . }}-config
  labels:
    {{- include "smtp-cloud-relay.labels" . | nindent 4 }}
data:
  DELIVERY_MODE: {{ .Values.deliveryMode | quote }}

  SMTP_LISTEN_ADDR: {{ .Values.smtp.listenAddr | quote }}
  SMTPS_LISTEN_ADDR: {{ .Values.smtp.smtpsListenAddr | quote }}
  SMTP_ALLOWED_CIDRS: {{ join "," .Values.smtp.allowedCIDRs | quote }}
  SMTP_REQUIRE_AUTH: {{ .Values.smtp.requireAuth | quote }}
  SMTP_AUTH_PROVIDER: {{ .Values.smtp.authProvider | quote }}
  SMTP_STARTTLS_ENABLED: {{ .Values.smtp.starttlsEnabled | quote }}
  SMTP_REQUIRE_TLS: {{ .Values.smtp.requireTLS | quote }}
  SMTP_TLS_CERT_FILE: {{ .Values.tls.certFile | quote }}
  SMTP_TLS_KEY_FILE: {{ .Values.tls.keyFile | quote }}
  SMTP_MAX_INFLIGHT_SENDS: {{ .Values.smtp.maxInflightSends | quote }}

  HTTP_LISTEN_ADDR: {{ .Values.http.listenAddr | quote }}

  ACS_ENDPOINT: {{ .Values.acs.endpoint | quote }}
  ACS_RETRY_ATTEMPTS: {{ .Values.acs.retryAttempts | quote }}
  ACS_RETRY_BASE_DELAY_MS: {{ .Values.acs.retryBaseDelayMS | quote }}
  ACS_HTTP_TIMEOUT_MS: {{ .Values.acs.httpTimeoutMS | quote }}
  ACS_HTTP_MAX_IDLE_CONNS: {{ .Values.acs.httpMaxIdleConns | quote }}
  ACS_HTTP_MAX_IDLE_CONNS_PER_HOST: {{ .Values.acs.httpMaxIdleConnsPerHost | quote }}
  ACS_HTTP_IDLE_CONN_TIMEOUT_MS: {{ .Values.acs.httpIdleConnTimeoutMS | quote }}
  {{- if .Values.acs.tlsCAFile }}
  ACS_TLS_CA_FILE: {{ .Values.acs.tlsCAFile | quote }}
  {{- else if .Values.extraTrustedCA.enabled }}
  ACS_TLS_CA_FILE: {{ printf "%s/%s" .Values.extraTrustedCA.mountPath .Values.extraTrustedCA.key | quote }}
  {{- end }}
