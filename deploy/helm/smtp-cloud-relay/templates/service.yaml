apiVersion: v1
kind: Service
metadata:
  name: {{ include "smtp-cloud-relay.fullname" . }}
  labels:
    {{- include "smtp-cloud-relay.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "smtp-cloud-relay.selectorLabels" . | nindent 4 }}
  ports:
    - name: smtp
      port: {{ .Values.service.smtpPort }}
      targetPort: smtp
      protocol: TCP
    - name: smtps
      port: {{ .Values.service.smtpsPort }}
      targetPort: smtps
      protocol: TCP
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
