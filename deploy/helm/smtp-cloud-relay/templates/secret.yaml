{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "smtp-cloud-relay.secretName" . }}
  labels:
    {{- include "smtp-cloud-relay.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if eq .Values.deliveryMode "acs" }}
  {{ .Values.secrets.keys.acsConnectionString }}: {{ required "secrets.acsConnectionString is required when deliveryMode=acs and secrets.create=true" .Values.secrets.acsConnectionString | quote }}
  {{ .Values.secrets.keys.acsSender }}: {{ required "secrets.acsSender is required when deliveryMode=acs and secrets.create=true" .Values.secrets.acsSender | quote }}
  {{- else }}
  {{ .Values.secrets.keys.acsConnectionString }}: {{ .Values.secrets.acsConnectionString | quote }}
  {{ .Values.secrets.keys.acsSender }}: {{ .Values.secrets.acsSender | quote }}
  {{- end }}
  {{ .Values.secrets.keys.smtpAuthUsername }}: {{ .Values.secrets.smtpAuthUsername | quote }}
  {{ .Values.secrets.keys.smtpAuthPassword }}: {{ .Values.secrets.smtpAuthPassword | quote }}
  {{- if .Values.secrets.acsTLSCAPEM }}
  {{ .Values.secrets.keys.acsTLSCAPEM }}: {{ .Values.secrets.acsTLSCAPEM | quote }}
  {{- end }}
{{- end }}
