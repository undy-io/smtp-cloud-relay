name: Reusable Validate

on:
  workflow_call:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Lint GitHub Actions workflows
        uses: rhysd/actionlint@e7d448ef7507c20fc4c88a95d0c448b848cd6127 # v1.7.8

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.19.2

      - name: Validate publish metadata resolution
        run: bash ./scripts/ci/check-publish-metadata.sh

      - name: Validate main tip freshness guard
        run: bash ./scripts/ci/check-main-tip-guard.sh

      - name: Validate container image publish logic
        run: bash ./scripts/ci/check-publish-container-image.sh

      - name: Validate OCI Helm chart publish logic
        run: bash ./scripts/ci/check-publish-oci-chart.sh

      - name: Validate production Dockerfile base image pinning
        run: bash ./scripts/ci/check-production-dockerfile.sh

      - name: Run Go tests
        run: make test

      # Image smoke builds run on GitHub-hosted runners, not inside the devcontainer.
      - name: Build container image smoke test
        run: make image IMAGE=smtp-cloud-relay:ci

      - name: Run Helm deployment validation
        run: bash ./scripts/ci/check-helm.sh

      - name: Run GitHub Pages Helm repo validation
        run: bash ./scripts/ci/check-gh-pages-chart-repo.sh
