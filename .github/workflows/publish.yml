name: Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: undy-io/smtp-cloud-relay
  CHART_DIR: deploy/helm/smtp-cloud-relay
  CHART_REGISTRY: oci://ghcr.io/undy-io/charts

defaults:
  run:
    shell: bash

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    # Publish reuses the GitHub-hosted validation workflow; it does not assume devcontainer Docker access.
    uses: ./.github/workflows/validate-reusable.yml

  publish:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve publish metadata
        id: meta
        run: bash ./scripts/ci/resolve-publish-metadata.sh

      - name: Log in to GHCR for container pushes
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR for Helm OCI pushes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s' "${GITHUB_TOKEN}" | \
            helm registry login "${REGISTRY}" \
              --username "${GITHUB_ACTOR}" \
              --password-stdin

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image_tags }}
          provenance: false
          sbom: false
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Package Helm chart
        run: |
          make helm-package \
            CHART_VERSION=${{ steps.meta.outputs.chart_version }} \
            CHART_APP_VERSION=${{ steps.meta.outputs.chart_app_version }}

      - name: Push Helm chart to GHCR
        run: |
          if [[ ! -f "${{ steps.meta.outputs.chart_archive }}" ]]; then
            echo "packaged chart not found: ${{ steps.meta.outputs.chart_archive }}" >&2
            exit 1
          fi

          helm push "${{ steps.meta.outputs.chart_archive }}" "${CHART_REGISTRY}"
