name: Publish

on:
  push:
    branches:
      - main
    tags:
      - "*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: undy-io/smtp-cloud-relay
  CHART_DIR: deploy/helm/smtp-cloud-relay
  CHART_REGISTRY: oci://ghcr.io/undy-io/charts
  PAGES_CHART_REPO_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/charts

defaults:
  run:
    shell: bash

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    # Publish reuses the GitHub-hosted validation workflow; it does not assume devcontainer Docker access.
    uses: ./.github/workflows/validate-reusable.yml

  publish_registry:
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      publish_kind: ${{ steps.meta.outputs.publish_kind }}
      chart_name: ${{ steps.meta.outputs.chart_name }}
      chart_version: ${{ steps.meta.outputs.chart_version }}
      chart_app_version: ${{ steps.meta.outputs.chart_app_version }}
      chart_archive: ${{ steps.meta.outputs.chart_archive }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Verify publish ref freshness
        run: bash ./scripts/ci/verify-main-tip.sh

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.19.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Resolve publish metadata
        id: meta
        run: bash ./scripts/ci/resolve-publish-metadata.sh

      - name: Log in to GHCR for container pushes
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR for Helm OCI pushes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s' "${GITHUB_TOKEN}" | \
            helm registry login "${REGISTRY}" \
              --username "${GITHUB_ACTOR}" \
              --password-stdin

      - name: Publish container image
        env:
          PUBLISH_KIND: ${{ steps.meta.outputs.publish_kind }}
          IMAGE_BUILD_REFS: ${{ steps.meta.outputs.image_build_refs }}
          IMAGE_ALIAS_REFS: ${{ steps.meta.outputs.image_alias_refs }}
          IMAGE_CANONICAL_REF: ${{ steps.meta.outputs.image_canonical_ref }}
          IMAGE_SHA_REF: ${{ steps.meta.outputs.image_sha_ref }}
        run: bash ./scripts/ci/publish-container-image.sh

      - name: Package Helm chart
        run: |
          make helm-package \
            CHART_VERSION=${{ steps.meta.outputs.chart_version }} \
            CHART_APP_VERSION=${{ steps.meta.outputs.chart_app_version }}

      - name: Upload packaged chart artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: packaged-chart
          path: ${{ steps.meta.outputs.chart_archive }}
          if-no-files-found: error

      - name: Push Helm chart to GHCR
        env:
          PUBLISH_KIND: ${{ steps.meta.outputs.publish_kind }}
          CHART_ARCHIVE: ${{ steps.meta.outputs.chart_archive }}
          CHART_REGISTRY: ${{ env.CHART_REGISTRY }}
          CHART_NAME: ${{ steps.meta.outputs.chart_name }}
          CHART_VERSION: ${{ steps.meta.outputs.chart_version }}
        run: bash ./scripts/ci/publish-oci-chart.sh

  publish_pages:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - validate
      - publish_registry
    outputs:
      pages_branch: ${{ steps.pages_repo.outputs.pages_branch }}
    permissions:
      contents: write
    concurrency:
      group: publish-pages
      cancel-in-progress: false
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.19.2

      - name: Download packaged chart artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: packaged-chart
          path: dist/charts

      - name: Update GitHub Pages chart repo content
        id: pages_repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHART_ARCHIVE: ${{ needs.publish_registry.outputs.chart_archive }}
          PAGES_SITE_URL: ${{ env.PAGES_CHART_REPO_URL }}
        run: bash ./scripts/ci/publish-gh-pages-chart-repo.sh

  deploy_pages:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: publish_pages
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out gh-pages branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.publish_pages.outputs.pages_branch }}

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: .

      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
