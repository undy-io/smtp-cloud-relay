name: Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: undy-io/smtp-cloud-relay
  CHART_DIR: deploy/helm/smtp-cloud-relay
  CHART_REGISTRY: oci://ghcr.io/undy-io/charts

defaults:
  run:
    shell: bash

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Run Go tests
        run: make test

      - name: Build container image smoke test
        run: make image IMAGE=smtp-cloud-relay:ci

      - name: Lint Helm chart
        run: make helm-lint

      - name: Render Helm chart smoke test
        run: |
          make helm-template \
            IMAGE_REPOSITORY=ghcr.io/undy-io/smtp-cloud-relay \
            CERT_MANAGER_ISSUER_NAME=cluster-issuer \
            CERT_MANAGER_DNS_NAME=smtp-relay.example.internal

  publish:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve publish metadata
        id: meta
        run: |
          set -euo pipefail

          chart_name="$(awk '$1 == "name:" { print $2; exit }' "${CHART_DIR}/Chart.yaml")"
          chart_version="$(awk '$1 == "version:" { print $2; exit }' "${CHART_DIR}/Chart.yaml")"

          if [[ -z "${chart_name}" || -z "${chart_version}" ]]; then
            echo "failed to read chart metadata from ${CHART_DIR}/Chart.yaml" >&2
            exit 1
          fi

          short_sha="${GITHUB_SHA::12}"
          sha_tag="sha-${short_sha}"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            release_version="${GITHUB_REF_NAME#v}"
            if [[ "${GITHUB_REF_NAME}" != v* || -z "${release_version}" ]]; then
              echo "release tags must use the vX.Y.Z form" >&2
              exit 1
            fi
            if [[ "${release_version}" != "${chart_version}" ]]; then
              echo "tag version ${release_version} does not match Chart.yaml version ${chart_version}" >&2
              exit 1
            fi

            publish_chart_version="${release_version}"
            publish_app_version="${release_version}"
            image_tags="${REGISTRY}/${IMAGE_NAME}:${release_version}
${REGISTRY}/${IMAGE_NAME}:${sha_tag}"
          else
            publish_chart_version="${chart_version}-main.${GITHUB_RUN_NUMBER}"
            publish_app_version="${sha_tag}"
            image_tags="${REGISTRY}/${IMAGE_NAME}:main
${REGISTRY}/${IMAGE_NAME}:${sha_tag}"
          fi

          {
            echo "chart_version=${publish_chart_version}"
            echo "chart_app_version=${publish_app_version}"
            echo "chart_archive=dist/charts/${chart_name}-${publish_chart_version}.tgz"
            echo "image_tags<<EOF"
            printf '%s\n' "${image_tags}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR for container pushes
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR for Helm OCI pushes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s' "${GITHUB_TOKEN}" | \
            helm registry login "${REGISTRY}" \
              --username "${GITHUB_ACTOR}" \
              --password-stdin

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image_tags }}
          provenance: false
          sbom: false
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Package Helm chart
        run: |
          make helm-package \
            CHART_VERSION=${{ steps.meta.outputs.chart_version }} \
            CHART_APP_VERSION=${{ steps.meta.outputs.chart_app_version }}

      - name: Push Helm chart to GHCR
        run: |
          if [[ ! -f "${{ steps.meta.outputs.chart_archive }}" ]]; then
            echo "packaged chart not found: ${{ steps.meta.outputs.chart_archive }}" >&2
            exit 1
          fi

          helm push "${{ steps.meta.outputs.chart_archive }}" "${CHART_REGISTRY}"
