name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Run Go tests
        run: make test

      - name: Build container image smoke test
        run: make image IMAGE=smtp-cloud-relay:ci

      - name: Lint Helm chart
        run: make helm-lint

      - name: Render Helm chart smoke test
        run: |
          make helm-template \
            IMAGE_REPOSITORY=ghcr.io/undy-io/smtp-cloud-relay \
            CERT_MANAGER_ISSUER_NAME=cluster-issuer \
            CERT_MANAGER_DNS_NAME=smtp-relay.example.internal
